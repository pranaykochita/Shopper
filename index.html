<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dopamine Cart</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            color: #2c3e50;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9em;
            color: #7f8c8d;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #3498db;
            outline: none;
        }
        .price-tag {
            font-size: 1.5em;
            font-weight: bold;
            color: #27ae60;
            margin: 20px 0;
            display: none;
        }
        button {
            background-color: #000;
            color: white;
            border: none;
            padding: 15px 20px;
            width: 100%;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.3s;
        }
        button:hover {
            background-color: #333;
        }
        button:active {
            transform: scale(0.98);
        }
        .spinner {
            display: none;
            margin: 20px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success-message {
            display: none;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .success-message h2 {
            color: #27ae60;
            font-size: 2em;
            margin-bottom: 10px;
        }
        .receipt {
            background: #f8f9fa;
            border: 1px dashed #bdc3c7;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
            font-family: monospace;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container" id="checkout-box">
        <h1>🛒 The Dopamine Cart</h1>
        <p style="color: #7f8c8d; margin-bottom: 30px;">100% of the thrill. 0% of the cost.</p>
        
        <div class="input-group">
            <label for="item">What are we treating ourselves to today?</label>
            <input type="text" id="item" placeholder="e.g., Premium Organic Matcha" oninput="generatePrice()">
        </div>

        <div class="price-tag" id="price-display"></div>

        <button id="buy-btn" onclick="startCheckout()">Simulate Purchase</button>
        <div class="spinner" id="spinner"></div>

        <div class="success-message" id="success">
            <h2>🎉 Secured!</h2>
            <p>Your dopamine has been successfully deposited.</p>
            <div class="receipt">
                <strong>🧾 VIRTUAL RECEIPT</strong><br><br>
                Item: <span id="receipt-item"></span><br>
                Cost: <span id="receipt-cost"></span><br>
                Actual Money Spent: $0.00<br>
                <strong>Money Saved: <span id="receipt-saved"></span></strong>
            </div>
            <button style="margin-top: 20px; background-color: #3498db;" onclick="resetCart()">Go Again</button>
        </div>
    </div>

    <script>
        let currentFakePrice = "$0.00";

        function generatePrice() {
            const input = document.getElementById('item').value;
            const priceDisplay = document.getElementById('price-display');
            
            if (input.length > 2) {
                // Generate a random high price to make the "save" feel better
                const randomPrice = (Math.random() * (450 - 20) + 20).toFixed(2);
                currentFakePrice = `$${randomPrice}`;
                priceDisplay.innerText = `Total: ${currentFakePrice}`;
                priceDisplay.style.display = 'block';
            } else {
                priceDisplay.style.display = 'none';
            }
        }

        function startCheckout() {
            const item = document.getElementById('item').value;
            if (!item) {
                alert("You gotta tell the universe what you want first!");
                return;
            }

            // Hide inputs, show spinner to build anticipation
            document.querySelector('.input-group').style.display = 'none';
            document.getElementById('price-display').style.display = 'none';
            document.getElementById('buy-btn').style.display = 'none';
            document.getElementById('spinner').style.display = 'block';

            // Simulate network delay for the dopamine build-up
            setTimeout(() => {
                document.getElementById('spinner').style.display = 'none';
                
                // Populate receipt
                document.getElementById('receipt-item').innerText = item;
                document.getElementById('receipt-cost').innerText = currentFakePrice;
                document.getElementById('receipt-saved').innerText = currentFakePrice;
                
                // Show success
                document.getElementById('success').style.display = 'block';
            }, 1800); // 1.8 seconds of pure anticipation
        }

        function resetCart() {
            document.getElementById('success').style.display = 'none';
            document.querySelector('.input-group').style.display = 'block';
            document.getElementById('buy-btn').style.display = 'block';
            document.getElementById('item').value = '';
            document.getElementById('price-display').style.display = 'none';
            currentFakePrice = "$0.00";
        }
    </script>
</body>
</html>
